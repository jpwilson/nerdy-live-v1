name: LiveSesh
options:
  bundleIdPrefix: com.nerdy.livesesh
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.0"
  createIntermediateGroups: true
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    DEVELOPMENT_TEAM: ""
    SUPABASE_URL: ""
    SUPABASE_ANON_KEY: ""
    SUPABASE_ACCESS_TOKEN: ""

targets:
  LiveSesh:
    type: application
    platform: iOS
    sources:
      - path: LiveSesh
        excludes:
          - "**/.DS_Store"
    settings:
      base:
        INFOPLIST_GENERATION_MODE: GeneratedFile
        PRODUCT_BUNDLE_IDENTIFIER: com.nerdy.livesesh
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: "UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: "UIInterfaceOrientationPortrait UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        INFOPLIST_KEY_NSCameraUsageDescription: "LiveSesh needs camera access to analyze engagement during tutoring sessions"
        INFOPLIST_KEY_NSMicrophoneUsageDescription: "LiveSesh needs microphone access to analyze speaking patterns during sessions"
        INFOPLIST_KEY_SUPABASE_URL: "$(SUPABASE_URL)"
        INFOPLIST_KEY_SUPABASE_ANON_KEY: "$(SUPABASE_ANON_KEY)"
        INFOPLIST_KEY_SUPABASE_ACCESS_TOKEN: "$(SUPABASE_ACCESS_TOKEN)"

  LiveSeshTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: LiveSeshTests
        excludes:
          - "**/.DS_Store"
    dependencies:
      - target: LiveSesh
    settings:
      base:
        INFOPLIST_GENERATION_MODE: GeneratedFile
        GENERATE_INFOPLIST_FILE: YES
        PRODUCT_BUNDLE_IDENTIFIER: com.nerdy.livesesh.tests
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/LiveSesh.app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)/LiveSesh"
        BUNDLE_LOADER: "$(TEST_HOST)"
